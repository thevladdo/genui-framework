services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: genui-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: genui-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
  redis_data:
    driver: local
